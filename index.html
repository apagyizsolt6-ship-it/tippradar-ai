<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TippRadar AI</title>

<style>
body{
font-family:Arial;
background:#101820;
color:white;
margin:0;
padding:20px;
}

h1{
color:#00ff99;
text-align:center;
}

.card{
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:12px;
}

.score{
font-size:24px;
color:#00ff99;
font-weight:bold;
}

button{
width:100%;
padding:15px;
font-size:18px;
background:#00c853;
color:white;
border:none;
border-radius:10px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>⚽ TippRadar AI</h1>

<div class="card">
<h2>Barcelona - Valencia</h2>

<p>Goal Index</p>
<div class="score">89</div>

<p>BTTS Index</p>
<div class="score">82</div>

<p>Corner Index</p>
<div class="score">77</div>

<p>Ajánlott piac:</p>

<h2>Over 2.5</h2>

</div>

<button onclick="alert('A következő verzióban valódi AI elemzés érkezik!')">
Elemzés
</button>

</body>
</html>
