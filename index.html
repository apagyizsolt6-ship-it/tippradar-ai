<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TippRadar AI v0.3 Lite</title>
<style>
body{margin:0;font-family:Arial;background:#07121a;color:white;padding-bottom:80px}
header{text-align:center;padding:22px;background:#0b1722}
h1{color:#00ff99;margin:0}
.small{color:#9ca3af}
.wrap{padding:16px}
.btns{display:flex;gap:8px;overflow-x:auto;margin-bottom:15px}
button{border:0;border-radius:20px;padding:12px 16px;background:#1e293b;color:white;font-weight:bold}
.active{background:#00c853}
.card{background:#142033;border-radius:18px;padding:16px;margin-bottom:15px}
.league{color:#00ff99}
.match{font-size:24px;font-weight:bold;margin:10px 0}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.box{background:#0b1722;border-radius:12px;padding:10px;text-align:center}
.box span{color:#9ca3af;font-size:12px}
.box b{display:block;color:#00ff99;font-size:26px}
.tip{margin-top:14px;padding:12px;border:1px solid #00c853;border-radius:12px;background:#052e1a}
.nav{position:fixed;bottom:0;left:0;right:0;background:#0b1722;display:flex;justify-content:space-around;padding:12px;border-top:1px solid #1e293b}
.nav div{text-align:center}
</style>
</head>
<body>

<header>
<h1>⚽ TippRadar AI</h1>
<div class="small">v0.3 Lite – stabil mobil verzió</div>
</header>

<div class="wrap">
<div class="btns">
<button class="active" onclick="show('all')">Összes</button>
<button onclick="show('top')">🔥 Top</button>
<button onclick="show('fav')">⭐ Kedvenc</button>
<button onclick="show('profile')">👤 Profil</button>
</div>

<div id="app"></div>
</div>

<div class="nav">
<div onclick="show('all')">🏠<br>Mai</div>
<div onclick="show('top')">🔥<br>Top</div>
<div onclick="show('fav')">⭐<br>Kedvenc</div>
<div onclick="show('profile')">👤<br>Profil</div>
</div>

<script>
let fav = JSON.parse(localStorage.getItem("fav") || "[]");

const games = [
 ["Olaszország","Roma","Lazio",66,70,73,91,58,"Lap Over"],
 ["Spanyolország","Barcelona","Valencia",89,82,77,61,55,"Over 2.5"],
 ["Anglia","Liverpool","Arsenal",84,86,81,74,62,"BTTS"],
 ["Németország","Dortmund","Leipzig",88,84,79,68,64,"Over 2.5"],
 ["Franciaország","PSG","Lyon",81,76,85,59,72,"Szöglet Over"],
 ["Magyarország","FTC","Paks",78,74,69,82,51,"Lap Over"]
];

function best(g){return Math.max(g[3],g[4],g[5],g[6],g[7]);}
function id(g){return g[1]+"-"+g[2];}

function toggle(x){
 if(fav.includes(x)){fav=fav.filter(a=>a!==x)}else{fav.push(x)}
 localStorage.setItem("fav",JSON.stringify(fav));
 show("all");
}

function card(g){
 let x=id(g);
 let saved=fav.includes(x);
 return `
 <div class="card">
 <div class="league">${g[0]}</div>
 <div class="match">${g[1]} – ${g[2]}</div>
 <div class="grid">
 <div class="box"><span>Goal</span><b>${g[3]}</b></div>
 <div class="box"><span>BTTS</span><b>${g[4]}</b></div>
 <div class="box"><span>Corner</span><b>${g[5]}</b></div>
 <div class="box"><span>Cards</span><b>${g[6]}</b></div>
 <div class="box"><span>Offside</span><b>${g[7]}</b></div>
 <div class="box"><span>Best</span><b>${best(g)}</b></div>
 </div>
 <div class="tip">
 Ajánlott piac: <b>${g[8]}</b><br>
 AI elemzés: ${best(g)}/100 adatjel. Ez nem biztos tipp, csak statisztikai jelzés.
 </div>
 <br>
 <button onclick="toggle('${x}')">${saved ? "⭐ Mentve" : "☆ Kedvenchez adás"}</button>
 </div>`;
}

function show(mode){
 document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 let list=[...games];

 if(mode==="top") list=list.filter(g=>best(g)>=85);
 if(mode==="fav") list=list.filter(g=>fav.includes(id(g)));
 if(mode==="profile"){
   document.getElementById("app").innerHTML=
   "<div class='card'><h2>👤 Profil</h2><p>Projekt: TippRadar AI</p><p>Verzió: v0.3 Lite</p><p>Kedvencek száma: "+fav.length+"</p><p>Ez még mintaadatokkal működő prototípus.</p></div>";
   return;
 }

 list.sort((a,b)=>best(b)-best(a));
 document.getElementById("app").innerHTML=list.map(card).join("") || "<div class='card'>Nincs találat.</div>";
}

show("all");
</script>

</body>
</html>
